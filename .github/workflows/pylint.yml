name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Simplified to modern versions (matching your local 3.12)
        python-version: ["3.10", "3.12"]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        # CRITICAL: This installs your Spark/Airflow/Pandas libs
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Analysing the code with pylint
      run: |
        # Using --exit-zero allows the build to finish even with style warnings
        # Remove --exit-zero later when you want strict 10/10 enforcement
        pylint $(git ls-files '*.py')